<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<body>
<section class="anim-up">
    <div class="form-container anim-scale" style="max-width:620px;">
        <div class="form-header">
            <div class="form-icon" style="background:linear-gradient(135deg,var(--secondary-tint),#BBF7D0);">
                <i data-lucide="user-check" style="width:26px;height:26px;color:var(--secondary-dark);"></i>
            </div>
            <div>
                <div class="form-title">Onboard Specialist</div>
                <div class="form-subtitle">Register a new medical professional to the hospital staff.</div>
            </div>
        </div>

        <form th:action="@{/doctors/save}" th:object="${doctor}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
                <label><i data-lucide="user"></i> Full Professional Name</label>
                <input type="text" th:field="*{name}" placeholder="e.g. Dr. Alexander Chen" required />
            </div>

            <div class="form-group">
                <label><i data-lucide="stethoscope"></i> Clinical Specialization</label>
                <select th:field="*{specialization}">
                    <option value="General Medicine">General Medicine</option>
                    <option value="Cardiology">Cardiology</option>
                    <option value="Dermatology">Dermatology</option>
                    <option value="Pediatrics">Pediatrics</option>
                    <option value="Orthopedics">Orthopedics</option>
                    <option value="Neurology">Neurology</option>
                    <option value="Gynecology">Gynecology</option>
                    <option value="Oncology">Oncology</option>
                    <option value="Psychiatry">Psychiatry</option>
                </select>
            </div>

            <div class="form-grid-2">
                <div class="form-group">
                    <label><i data-lucide="award"></i> Years of Experience</label>
                    <input type="number" th:field="*{experience}" placeholder="e.g. 12" min="0" max="80" required />
                </div>
                <div class="form-group">
                    <label><i data-lucide="mail"></i> Professional Email</label>
                    <input type="email" th:field="*{email}" placeholder="doctor@hospital.com" required />
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-secondary" style="flex:2;">
                    <i data-lucide="shield-check"></i> Register Specialist
                </button>
                <a href="/doctors" class="btn btn-white" style="flex:1;">
                    <i data-lucide="x"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
