# Production Configuration (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:hospital_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Create schema on startup
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Port for Render (dynamic)
server.port=${PORT:8080}

# Logging for troubleshooting
logging.level.org.springframework=INFO
logging.level.com.hospital=DEBUG
logging.level.org.hibernate.SQL=DEBUG
